services:
  mock-upstream:
    image: python:3.13-alpine
    working_dir: /app
    volumes:
      - ..:/app
    command: ["python", "/app/proof/mock_upstream.py", "--port", "18081"]
    ports:
      - "18081:18081"

  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      - mock-upstream
    environment:
      GATEWAY_LISTEN_ADDR: ":8080"
      GATEWAY_UPSTREAM_BASE_URL: "http://mock-upstream:18081"
      GATEWAY_REQUEST_TIMEOUT: "30s"
      GATEWAY_ENABLE_METRICS: "true"
    ports:
      - "18080:8080"

