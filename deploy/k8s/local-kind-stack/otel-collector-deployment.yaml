apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.122.1
          imagePullPolicy: IfNotPresent
          args:
            - "--config=/etc/otelcol-contrib/config.yaml"
          ports:
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 13133
          volumeMounts:
            - name: otel-collector-config
              mountPath: /etc/otelcol-contrib
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
            items:
              - key: config.yaml
                path: config.yaml
