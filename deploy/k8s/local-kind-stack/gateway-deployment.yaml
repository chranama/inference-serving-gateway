apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: inference-serving-gateway:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: GATEWAY_LISTEN_ADDR
              value: ":8080"
            - name: GATEWAY_UPSTREAM_BASE_URL
              value: "http://api:8000"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
